<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexion</title>
    <meta name="theme-color" content="#091426" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, rgba(9, 20, 38, 1) 0%, rgba(12, 27, 49, 1) 62%, rgba(10, 63, 70, 1) 100%);
        color: #f8fafc;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.04);
        padding: 28px;
        box-shadow: 0 24px 64px rgba(2, 8, 23, 0.45);
      }
      .eyebrow {
        margin: 0;
        color: #6ee7b7;
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 0;
        font-size: 38px;
        line-height: 1.02;
      }
      p {
        margin: 16px 0 0;
        color: rgba(248, 250, 252, 0.78);
        line-height: 1.65;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }
      button,
      a {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 12px 18px;
        color: #f8fafc;
        background: rgba(255, 255, 255, 0.05);
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Modo offline</p>
      <h1>Ahora mismo no hay conexion</h1>
      <p>La app sigue instalada, pero esta pantalla necesita internet para cargar datos financieros actualizados.</p>
      <div class="actions">
        <button onclick="window.location.reload()">Reintentar</button>
        <a href="/dashboard">Volver al panel</a>
      </div>
    </main>
  </body>
</html>
